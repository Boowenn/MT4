name: QuantGod CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: quantgod-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Vue build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build committed Vue dashboard
        working-directory: frontend
        run: npm run build

      - name: Verify built dashboard is committed
        run: git diff --exit-code -- Dashboard/vue-dist

  python-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m unittest discover tests

  static-guards:
    name: Regression and safety guards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Whitespace check
        run: git diff --check

      - name: QuantGod regression guard
        run: python tools/ci_guard.py
