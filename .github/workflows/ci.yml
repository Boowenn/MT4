name: QuantGod Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quantgod-backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Run unittest suite
        run: python -m unittest discover tests -v
      - name: Coverage summary
        run: python -m pytest tests -q --cov=tools --cov-report=term-missing

  node-api-tests:
    name: Node API contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install root Node dependencies when lockfile exists
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Run Node API tests
        run: npm test

  static-guards:
    name: Regression and safety guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Whitespace check
        run: git diff --check
      - name: QuantGod regression guard
        run: python tools/ci_guard.py
      - name: No frontend source should remain in backend
        run: |
          test ! -d frontend
          test ! -d cloudflare
